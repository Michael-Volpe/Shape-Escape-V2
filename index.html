<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Escape - 2 Player Edition</title>
    
    <script src="https://unpkg.com/convex@1.11.0/dist/browser.bundle.js"></script>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="gamemodes/gamemodes.css"> 
    <link rel="stylesheet" href="leaderboard/leaderboard.css">
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-color: #0a0a0a;
        }

        #ui {
            z-index: 10; /* Ensure UI stays above game elements */
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 2px solid #222;
        }

        @keyframes pulse-red { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        .offline-dot { width: 6px; height: 6px; background: #ff4444; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse-red 2s infinite; }

        /* Logic for hiding/showing elements based on menu state */
        .menu-open .ingame-only { display: none !important; }

        .hidden-ui { display: none !important; }

        .glass-btn {
            padding: 5px 12px;
            cursor: pointer;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 9px;
            font-family: monospace;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            transition: 0.2s;
        }
        .glass-btn:hover { background: rgba(255,255,255,0.1); }

        /* --- NEW CHARACTER SUBMENU STYLES --- */
        .character-menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .submenu {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 80%;
            margin-top: 8px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            animation: slideDown 0.25s ease-out;
        }

        .submenu-btn {
            padding: 8px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            color: #ccc;
            font-family: monospace;
            font-size: 10px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .submenu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ff4444;
            color: #fff;
        }

        .shop-btn { border-left: 3px solid #ffeb3b; }
        .custom-btn { border-left: 3px solid #4444ff; }

        /* --- FIX: PREVIEW BOX VISUALS --- */
        .preview-box {
            width: 40px;
            height: 40px;
            margin-bottom: 10px;
            background-size: cover !important;
            background-repeat: repeat !important;
            background-blend-mode: multiply;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="menu-open"> 
    <div id="ui">
        <div class="score-box">
            <div class="label circle" id="labelP1">Guest</div>
            <div>High: <span id="highScoreP1">0</span></div>
            <div class="ingame-only">Score: <span id="scoreValueP1">0</span></div>
        </div>
        
        <div class="level-box">
            <div class="ingame-only">
                <div class="level-indicator">Level: <span id="levelValue">1</span></div>
                <div class="timer-display"><span id="timerValue">0.00</span>s</div>
            </div>
            <div class="coin-display"><span class="coin-icon">🪙</span> <span id="coinsEarnedDisplay">0</span></div>
        </div>

        <div class="score-box">
            <div id="p2-ui-section" class="ingame-only">
                </div>
            
            <div id="bank-display">
                <span class="bank-label">BANK</span>
                <span id="totalCoins">0</span>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div id="auth-trigger-area" style="position: absolute; bottom: 12px; left: 12px; z-index: 1000; display: flex; align-items: center; gap: 10px;">
            <button onclick="toggleAuthPopup()" class="glass-btn">ACCOUNT</button>
            <div style="background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; display: flex; align-items: center; border: 1px solid #222;">
                <span id="status-dot" class="offline-dot"></span>
                <span id="welcome-tag" style="color: #888; font-family: monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1px;">Offline</span>
            </div>
        </div>

        <div id="online-feature-area" style="position: absolute; bottom: 12px; right: 12px; z-index: 1000; display: flex; align-items: center;">
            <div style="background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; display: flex; align-items: center; border: 1px solid #222; color: #00ff88; font-family: monospace; font-size: 9px; letter-spacing: 1px;">
                <span style="width: 6px; height: 6px; background: #00ff88; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px #00ff88;"></span>
                PLAYERS: <span id="online-count" style="margin-left: 4px;">1</span>
            </div>
        </div>

        <div id="pauseOverlay" class="hidden">
            <div class="pause-icon">
                <div class="pause-bar"></div>
                <div class="pause-bar"></div>
            </div>
            <div class="pause-text">PAUSED</div>
        </div>

        <div id="menu">
            <h1 class="glitch" data-text="SHAPE ESCAPE">SHAPE ESCAPE</h1>
            <p>Stay off the ceiling!</p>
            <br>
            <div class="btn-group-vertical">
                <button onclick="window.location.href='gamemodes/gamemodes.html'">Gamemodes</button>
                <button class="menu-btn" onclick="window.location.href='leaderboard/leaderboard.html'">Leaderboard</button>
                
                <div class="character-menu-container">
                    <button id="characterBtn" class="menu-btn" onclick="toggleCharacterSubmenu()">Character</button>
                    <div id="characterSubmenu" class="submenu hidden">
                        <button class="submenu-btn shop-btn" onclick="window.location.href='shop/shop.html'">🛒 Shop</button>
                        <button class="submenu-btn custom-btn" onclick="toggleCustomization()">🎨 Customization</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="customizationMenu" class="hidden">
            <div class="glass wide">
                <h2>CHARACTER CREATOR</h2>
                <div class="custom-grid">
                    <div class="player-col">
                        <div class="preview-card">
                            <div id="p1Preview" class="preview-box"></div>
                            <span id="prevName1" class="preview-name">Player 1</span>
                        </div>
                        <div class="input-group">
                            <label>NAME</label>
                            <input type="text" id="p1Name" placeholder="P1 Name" oninput="updateCustoms()" maxlength="10">
                            <label>COLOR</label>
                            <input type="color" id="p1Color" value="#ff4444" oninput="updateCustoms()">
                            <label>SHAPE</label>
                            <select id="p1Shape" onchange="updateCustoms()">
                                <option value="50%">Circle</option>
                                <option value="0%">Square</option>
                                <option value="8px">Rounded</option>
                                <option value="shape-triangle">Triangle</option>
                                <option value="shape-diamond">Diamond</option>
                                <option value="shape-hexagon">Hexagon</option>
                            </select>
                            <label>SKIN</label>
                            <select id="p1Skin" onchange="updateCustoms()">
                                <option value="">None</option>
                                </select>
                        </div>
                    </div>
                    <div class="player-col">
                        <div class="preview-card">
                            <div id="p2Preview" class="preview-box"></div>
                            <span id="prevName2" class="preview-name">Player 2</span>
                        </div>
                        <div class="input-group">
                            <label>NAME</label>
                            <input type="text" id="p2Name" placeholder="P2 Name" oninput="updateCustoms()" maxlength="10">
                            <label>COLOR</label>
                            <input type="color" id="p2Color" value="#4444ff" oninput="updateCustoms()">
                            <label>SHAPE</label>
                            <select id="p2Shape" onchange="updateCustoms()">
                                <option value="0%">Square</option>
                                <option value="50%">Circle</option>
                                <option value="8px">Rounded</option>
                                <option value="shape-triangle">Triangle</option>
                                <option value="shape-diamond">Diamond</option>
                                <option value="shape-hexagon">Hexagon</option>
                            </select>
                            <label>SKIN</label>
                            <select id="p2Skin" onchange="updateCustoms()">
                                <option value="">None</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button class="save-btn" onclick="toggleCustomization()">SAVE & CLOSE</button>
            </div>
        </div>

        <div id="gameOver" class="hidden">
            <div class="glass">
                <h2 class="glitch" data-text="GAME OVER">GAME OVER</h2>
                <div id="finalScores">
                    <div id="finalP1Row" class="final-score-row">
                        <span id="finalP1Name">PLAYER 1</span>
                        <span id="finalP1">0</span>
                    </div>
                    <div id="finalP2Row" class="final-score-row hidden">
                        <span id="finalP2Name">PLAYER 2</span>
                        <span id="finalP2">0</span>
                    </div>
                </div>
                <div id="deathCoinBonus" style="margin-top: 10px; color: #ffeb3b; font-family: monospace;">
                     COINS EARNED: +<span id="coinsEarned">0</span>
                </div>
                <div class="btn-group-vertical">
                    <button onclick="restartGame()">PLAY AGAIN</button>
                    <button class="menu-btn" onclick="goToMenu()">MAIN MENU</button>
                </div>
            </div>
        </div>

        <div id="game">
            <div id="character"></div>
            <div id="particle-container"></div>
        </div>
    </div>

    <div id="auth-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center;">
        <div id="auth-section" style="font-family: monospace;">
            <div id="login-form" class="glass" style="padding: 25px; border-radius: 12px; background: rgba(10,10,10,0.95); border: 2px solid #444; width: 280px; text-align: center;">
                <h3 style="color: #ff4444; margin-bottom: 20px; letter-spacing: 2px;">PLAYER PORTAL</h3>
                <input type="text" id="auth-username" placeholder="Username" style="width: 100%; margin-bottom: 10px; padding: 10px; background: #000; color: white; border: 1px solid #444; border-radius: 4px; outline: none;">
                <input type="password" id="auth-password" placeholder="Password" style="width: 100%; margin-bottom: 20px; padding: 10px; background: #000; color: white; border: 1px solid #444; border-radius: 4px; outline: none;">
                <div style="display: flex; gap: 8px;">
                    <button onclick="handleAuth('login')" style="flex: 1; padding: 10px; border: 1px solid #ff4444; color: #ff4444; background: transparent; cursor: pointer; font-weight: bold;">LOGIN</button>
                    <button onclick="handleAuth('signup')" style="flex: 1; padding: 10px; border: 1px solid #888; color: #888; background: transparent; cursor: pointer;">SIGN UP</button>
                </div>
                <button onclick="toggleAuthPopup()" style="margin-top: 15px; background: transparent; border: none; color: #555; text-decoration: underline; cursor: pointer; font-size: 11px;">CLOSE</button>
            </div>

            <div id="user-display" class="hidden glass" style="padding: 25px; border-radius: 12px; background: rgba(10,10,10,0.95); border: 2px solid #444; width: 280px; text-align: center;">
                <div style="font-size: 10px; color: #888; margin-bottom: 5px;">CURRENT SESSION</div>
                <div id="player-name-tag" style="color: #ff4444; font-weight: bold; font-size: 20px; margin-bottom: 20px; letter-spacing: 1px;"></div>
                <button onclick="logout()" style="width: 100%; padding: 10px; background: transparent; border: 1px solid #ff4444; color: #ff4444; cursor: pointer; font-weight: bold; margin-bottom: 10px;">LOG OUT</button>
                <button onclick="toggleAuthPopup()" style="margin-top: 5px; background: transparent; border: none; color: #555; text-decoration: underline; cursor: pointer; font-size: 11px;">BACK</button>
            </div>
        </div>
    </div>

    <audio id="sfx-click" src="https://actions.google.com/sounds/v1/foley/button_click.ogg" preload="auto" crossorigin="anonymous"></audio>
    <audio id="sfx-lightning" src="https://actions.google.com/sounds/v1/electricity/zap.ogg" preload="auto" crossorigin="anonymous"></audio>
    <audio id="sfx-fire" src="https://actions.google.com/sounds/v1/foley/fire_crackle.ogg" preload="auto" crossorigin="anonymous"></audio>
    <audio id="sfx-death" src="https://actions.google.com/sounds/v1/cartoon/boing_spring.ogg" preload="auto" crossorigin="anonymous"></audio>
    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop preload="auto" crossorigin="anonymous"></audio>

    <script src="script.js"></script>
    <script>
        // Character submenu toggle script
        function toggleCharacterSubmenu() {
            const submenu = document.getElementById("characterSubmenu");
            submenu.classList.toggle("hidden");
            if (typeof playSound === 'function') {
                playSound(document.getElementById("sfx-click"));
            }
        }
    </script>
</body>
</html>
