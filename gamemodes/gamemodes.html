<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamemodes - Shape Escape</title>
    <link rel="stylesheet" href="gamemodes.css">
</head>
<body>
    <div id="game-container">
        <div id="menu">
            <h1 class="glitch" data-text="GAMEMODES">GAMEMODES</h1>
            <p>Select your challenge</p>
            <br>
            
            <div class="btn-group-vertical">
                <div class="mode-section">
                    <span class="mode-title">Freefall</span>
                    <button onclick="selectMode('freefall', 1)">Singleplayer</button>
                    <button onclick="selectMode('freefall', 2)">2 Player</button>
                </div>

                <div class="mode-section">
                    <span class="mode-title">Meteor Dash</span>
                    <button class="meteor-btn" onclick="selectMode('meteor', 1)">Singleplayer</button>
                    
                </div>
                
                <br>
                <button class="menu-btn" onclick="window.location.href='../index.html'">
                    BACK TO MENU
                </button>
            </div>
        </div>
    </div>

    <script>
        function selectMode(type, mode) {
            sessionStorage.setItem("activeGameType", type);
            sessionStorage.setItem("lastGameMode", mode);
            
            if (type === 'meteor') {
                // Moving UP one level to find the meteor_dash folder
                window.location.href = '../meteor_dash/meteor_dash.html';
            } else {
                window.location.href = '../index.html';
            }
        }
    </script>
</body>
</html>
