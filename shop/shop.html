<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Escape - The Shop</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="shop.css">
        <link rel="stylesheet" href="skins/skins.css">
</head>
<body>
    <div id="shop-container">
        <div class="shop-header">
            <button class="back-btn" onclick="window.location.href='../index.html'">← BACK</button>
            <h1 class="glitch" data-text="THE SHOP">THE SHOP</h1>
            <div class="currency-panel">
                <span class="coin-icon">🪙</span>
                <span id="shop-balance">0</span>
            </div>
        </div>

        <div class="shop-tabs">
            <button class="tab-btn active" onclick="switchTab('daily')">OFFERS</button>
            <button class="tab-btn" onclick="switchTab('skins')">SKINS</button>
            <button class="tab-btn" onclick="switchTab('crates')">CRATES</button>
        </div>

        <div id="shop-content">
            <div id="offers-tab" class="shop-section">
                <div class="section-header">
                    <h3 class="section-title">FEATURED ITEMS</h3>
                    <span id="shop-timer" class="timer">RESET: 00:00:00</span>
                </div>
                <div id="daily-offers-grid" class="item-grid">
                </div>
            </div>

            <div id="skins-tab" class="shop-section hidden">
                <div class="section-header">
                    <h3 class="section-title">PATTERN OVERLAYS</h3>
                </div>
                <div id="full-skins-grid" class="item-grid">
                </div>
            </div>

            <div id="crates-tab" class="shop-section hidden">
                <div class="section-header">
                    <h3 class="section-title">LOOT DROPS</h3>
                </div>
                <div id="crates-grid" class="item-grid">
                </div>
            </div>
        </div>
    </div>

    <div id="crate-overlay" class="hidden">
        <div class="spinner-container">
            <div class="spinner-marker"></div>
            <div id="item-spinner" class="spinner-track"></div>
        </div>

        <div id="reward-display" class="hidden">
            <div class="reward-content">
                <h2 id="reward-rarity-text">NEW SKIN UNLOCKED!</h2>
                <div id="reward-preview" class="item-preview"></div>
                <h3 id="reward-name">SKIN NAME</h3>
                <button class="buy-btn" onclick="closeCrate()">COLLECT</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/convex@1.9.0/dist/browser.bundle.js"></script>
    <script src="shop.js"></script>
</body>
</html>
